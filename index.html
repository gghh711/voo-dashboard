<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21點股票查詢</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-txt: #3B6D11; --green-bg: #EAF3DE;
    --red-txt:   #A32D2D; --red-bg:   #FCEBEB;
    --border: #E5E5E5; --bg: #F7F7F5; --card: #FFFFFF;
    --text: #1A1A1A; --muted: #888888; --radius: 10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--card); border-bottom: 0.5px solid var(--border);
           padding: 14px 24px; display: flex; align-items: center; gap: 12px;
           position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .logo { width: 32px; height: 32px; background: var(--text); border-radius: 7px;
          display: flex; align-items: center; justify-content: center;
          color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; }
  header .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .search-card { background: var(--card); border: 0.5px solid var(--border);
                 border-radius: var(--radius); padding: 18px; margin-bottom: 18px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .search-row input { flex: 1; font-size: 17px; font-weight: 500; padding: 10px 14px;
                      border: 1.5px solid var(--border); border-radius: 8px;
                      background: var(--bg); color: var(--text); outline: none;
                      font-family: inherit; letter-spacing: 0.5px; }
  .search-row input:focus { border-color: var(--text); }
  .search-row input::placeholder { color: #bbb; font-weight: 400; letter-spacing: 0; }
  .btn { padding: 10px 24px; background: var(--text); color: #fff; border: none;
         border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
         font-family: inherit; white-space: nowrap; }
  .btn:hover { opacity: .82; } .btn:disabled { opacity: .4; cursor: default; }
  .quick { display: flex; flex-wrap: wrap; gap: 6px; }
  .qb { font-size: 11px; padding: 3px 10px; border-radius: 20px;
        border: 0.5px solid var(--border); background: transparent;
        color: var(--muted); cursor: pointer; font-family: inherit; }
  .qb:hover { background: var(--bg); color: var(--text); }
  .status { font-size: 12px; min-height: 20px; margin-bottom: 14px; color: var(--muted);
            display: flex; align-items: center; gap: 6px; }
  .status.ok { color: var(--green-txt); } .status.err { color: var(--red-txt); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 13px; height: 13px; border: 2px solid #ddd; border-top-color: var(--text);
             border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  .status.loading .spinner { display: block; }
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
             gap: 9px; margin-bottom: 14px; }
  .sc { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px;
        padding: 12px 13px; text-align: center; }
  .sc-v { font-size: 21px; font-weight: 600; display: block; line-height: 1.2; }
  .sc-l { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .sc-side { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 6px;
             display: inline-block; margin-top: 2px; }
  .gauge-card { background: var(--card); border: 0.5px solid var(--border);
                border-radius: 8px; padding: 13px 15px; margin-bottom: 14px; }
  .gauge-lbl { font-size: 10px; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
  .gauge-track { height: 18px; border-radius: 9px; background: var(--bg); overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 9px; transition: width .5s ease, background .4s; }
  .gauge-ticks { display: flex; justify-content: space-between;
                 font-size: 10px; color: var(--muted); margin-top: 4px; }
  .table-card { background: var(--card); border: 0.5px solid var(--border);
                border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .tscroll { max-height: 480px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th { font-size: 10px; font-weight: 500; color: var(--muted); text-align: right;
             padding: 8px 9px; border-bottom: 0.5px solid var(--border);
             background: var(--card); position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  thead th:first-child { text-align: left; }
  tbody td { text-align: right; padding: 6px 9px; border-bottom: 0.5px solid #F5F5F5; }
  tbody td:first-child { text-align: left; font-size: 11px; color: var(--muted); }
  tbody tr:hover td { background: #FAFAFA; }
  tbody tr:last-child td { border-bottom: none; }
  .up { color: var(--green-txt); font-weight: 500; } .dn { color: var(--red-txt); font-weight: 500; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
  .bm { background: var(--green-bg); color: var(--green-txt); }
  .bs { background: var(--red-bg); color: var(--red-txt); }
  .pt-cell { font-weight: 700; font-size: 13px; }
  .empty { text-align: center; padding: 44px 20px; color: var(--muted); font-size: 13px; line-height: 2; }
  .note { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px;
          padding: 11px 14px; font-size: 11px; color: var(--muted); line-height: 1.8; }
  .note b { color: var(--text); }
</style>
</head>
<body>
<header>
  <div class="logo">21</div>
  <div><h1>21點股票查詢</h1><div class="sub">差值 × 點數 即時計算</div></div>
</header>
<div class="container">
  <div class="search-card">
    <div class="search-row">
      <input id="inp" type="text" placeholder="輸入代碼，如 2330 或 QQQ"
        maxlength="8" autocomplete="off" onkeydown="if(event.key==='Enter')go()">
      <button class="btn" id="searchBtn" onclick="go()">查詢</button>
    </div>
    <div class="quick">
      <span style="font-size:11px;color:var(--muted);align-self:center">常用：</span>
      <button class="qb" onclick="q('2330')">台積電 2330</button>
      <button class="qb" onclick="q('2327')">國巨 2327</button>
      <button class="qb" onclick="q('2344')">華邦電 2344</button>
      <button class="qb" onclick="q('2352')">佳世達 2352</button>
      <button class="qb" onclick="q('0050')">元大50 0050</button>
      <button class="qb" onclick="q('2454')">聯發科 2454</button>
      <button class="qb" onclick="q('2317')">鴻海 2317</button>
      <button class="qb" onclick="q('QQQ')">QQQ</button>
      <button class="qb" onclick="q('VOO')">VOO</button>
    </div>
  </div>
  <div class="status" id="st">
    <div class="spinner" id="sp"></div>
    <span id="stMsg">輸入股票代碼後按查詢</span>
  </div>
  <div id="results"></div>
</div>
<script>
const API_BASE = 'https://voo-stock.onrender.com';

function q(c) { document.getElementById('inp').value = c; go(); }
function setSt(msg, cls) {
  const bar = document.getElementById('st');
  bar.className = 'status' + (cls ? ' ' + cls : '');
  document.getElementById('stMsg').textContent = msg;
}

async function go() {
  const code = document.getElementById('inp').value.trim().replace(/[^0-9A-Za-z^.]/g,'').toUpperCase();
  if (!code) { setSt('請輸入股票代碼','err'); return; }
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setSt('查詢中，請稍候…','loading');
  document.getElementById('results').innerHTML = '';
  try {
    const res  = await fetch(`${API_BASE}/api/stock?code=${encodeURIComponent(code)}`, { signal: AbortSignal.timeout(25000) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.rows || !data.rows.length) throw new Error('無數據');
    render(data.name, data.code, data.rows);
    setSt(`✓ ${data.name}（${data.code}）— 最近 ${data.rows.length} 個交易日`, 'ok');
  } catch(e) {
    document.getElementById('results').innerHTML =
      `<div class="table-card"><div class="empty">⚠️ ${e.message}<br>
      <span style="font-size:11px;color:#bbb">台股用4位數字（2330）；美股用英文代號（QQQ）<br>
      Render 伺服器首次喚醒需約 30 秒，請稍後再試</span></div></div>`;
    setSt('查詢失敗','err');
  } finally { btn.disabled = false; }
}

function render(name, code, rows) {
  const L = rows[0];
  const col  = L.pt != null && L.pt > 10 ? 'var(--green-txt)' : 'var(--red-txt)';
  const bg   = L.pt != null && L.pt > 10 ? 'var(--green-bg)'  : 'var(--red-bg)';
  const side = L.pt != null ? (L.pt > 10 ? '多方（綠）' : '空方（紅）') : '—';
  const pct  = ((L.diff ?? 0) / 94.5 * 100).toFixed(1);
  const fillC = L.pt != null && L.pt > 10 ? '#1D9E75' : '#E24B4A';
  const ddCol  = L.dd  != null ? (L.dd  > 0 ? 'var(--green-txt)' : L.dd  < 0 ? 'var(--red-txt)' : 'inherit') : 'inherit';
  const chgCol = L.chg != null ? (L.chg > 0 ? 'var(--green-txt)' : L.chg < 0 ? 'var(--red-txt)' : 'inherit') : 'inherit';
  let trs = '';
  rows.forEach(r => {
    const pc  = r.chg_p > 0 ? 'up' : r.chg_p < 0 ? 'dn' : '';
    const dc  = r.dd    > 0 ? 'up' : r.dd    < 0 ? 'dn' : '';
    const ptc = r.pt != null ? (r.pt > 10 ? 'var(--green-txt)' : 'var(--red-txt)') : '#888';
    const sb  = r.pt != null ? (r.pt > 10 ? 'bm' : 'bs') : '';
    trs += `<tr>
      <td>${r.date}</td>
      <td>${(r.close??0).toLocaleString()}</td>
      <td class="${pc}">${r.chg_p!=null?(r.chg_p>0?'+':'')+r.chg_p+'%':'—'}</td>
      <td><b>${r.diff??'—'}</b></td>
      <td class="${dc}">${r.dd!=null?(r.dd>0?'+':'')+r.dd:'—'}</td>
      <td class="pt-cell" style="color:${ptc}">${r.pt??'—'}</td>
      <td><span class="badge ${sb}">${r.pt!=null?(r.pt>10?'多':'空'):'—'}</span></td>
    </tr>`;
  });
  document.getElementById('results').innerHTML = `
    <div class="summary">
      <div class="sc"><span class="sc-v" style="color:${col}">${L.pt??'—'}</span><div class="sc-l">今日點數</div></div>
      <div class="sc"><span class="sc-v">${L.diff??'—'}</span><div class="sc-l">今日差值</div></div>
      <div class="sc"><span class="sc-v" style="color:${ddCol}">${L.dd!=null?(L.dd>0?'+':'')+L.dd:'—'}</span><div class="sc-l">差值差</div></div>
      <div class="sc"><span class="sc-v" style="color:${chgCol}">${(L.close??0).toLocaleString()}</span><div class="sc-l">收盤價</div></div>
      <div class="sc"><span class="sc-side" style="background:${bg};color:${col}">${side}</span><div class="sc-l">方向</div></div>
    </div>
    <div class="gauge-card">
      <div class="gauge-lbl">差值位置（0 ～ 94.5）　現在：${L.diff??'—'}</div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${fillC}"></div></div>
      <div class="gauge-ticks"><span>0</span><span>10</span><span>50</span><span>80</span><span>90</span><span>94.5</span></div>
    </div>
    <div class="table-card"><div class="tscroll"><table>
      <thead><tr>
        <th style="text-align:left">日期</th>
        <th>收盤</th><th>漲跌%</th><th>差值</th><th>差值差</th><th>點數</th><th>多空</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table></div></div>
    <div class="note">
      <b>${name}（${code}）</b>　差值 = ADX 14日（0～94.5）　點數 = round( 差值 ÷ 94.5 × 21 )
    </div>`;
}
</script>
</body>
</html>
